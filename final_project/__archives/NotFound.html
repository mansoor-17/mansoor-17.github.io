<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="./error.css" />
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"
      integrity="sha512-bLT0Qm9VnAYZDflyKcBaQ2gg0hSYNQrJ8RilYldYQ1FxQYoCLtUjuuRuZo+fjqhx/qtq/1itJ0C2ejDxltZVFg=="
      crossorigin="anonymous"
    ></script>
    <style>
      @import url(https://fonts.googleapis.com/css?family=Ubuntu);
      html,
      body {
        background: #ffffff;
        font-family: "Ubuntu";
      }

      * {
        box-sizing: border-box;
      }

      .box {
        width: 350px;
        height: 100%;
        max-height: 600px;
        min-height: 450px;
        background: #ffffff;
        border-radius: 20px;
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        padding: 30px 50px;
      }
      .box .box__ghost {
        padding: 15px 25px 25px;
        position: absolute;
        left: 50%;
        top: 30%;
        transform: translate(-50%, -30%);
      }

      .box .box__ghost .box__ghost-container {
        background: rgb(0, 0, 0);
        width: 100px;
        height: 100px;
        border-radius: 100px 100px 0 0;
        position: relative;
        margin: 0 auto;
        animation: upndown 3s ease-in-out infinite;
      }
      .box .box__ghost .box__ghost-container .box__ghost-eyes {
        position: absolute;
        left: 50%;
        top: 45%;
        height: 12px;
        width: 70px;
      }
      .box .box__ghost .box__ghost-container .box__ghost-eyes .box__eye-left {
        width: 12px;
        height: 12px;
        background: #ffffff;
        border-radius: 50%;
        margin: 0 10px;
        position: absolute;
        left: 0;
      }
      .box .box__ghost .box__ghost-container .box__ghost-eyes .box__eye-right {
        width: 12px;
        height: 12px;
        background: #ffffff;
        border-radius: 50%;
        margin: 0 10px;
        position: absolute;
        right: 0;
      }
      .box .box__ghost .box__ghost-container .box__ghost-bottom {
        display: flex;
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
      }
      .box .box__ghost .box__ghost-container .box__ghost-bottom div {
        flex-grow: 1;
        position: relative;
        top: -10px;
        height: 20px;
        border-radius: 100%;
        background-color: rgb(0, 0, 0);
      }
      .box
        .box__ghost
        .box__ghost-container
        .box__ghost-bottom
        div:nth-child(2n) {
        top: -12px;
        margin: 0 0px;
        border-top: 15px solid #ffffff;
        background: transparent;
      }
      .box .box__ghost .box__ghost-shadow {
        height: 20px;
        box-shadow: 0 50px 15px 5px #868686;
        border-radius: 50%;
        margin: 0 auto;
        animation: smallnbig 3s ease-in-out infinite;
      }
      .box .box__description {
        position: absolute;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
      }
      .box .box__description .box__description-container {
        color: #fff;
        text-align: center;
        width: 200px;
        font-size: 16px;
        margin: 0 auto;
      }
      .box
        .box__description
        .box__description-container
        .box__description-title {
        font-size: 24px;
        letter-spacing: 0.5px;
      }
      .box
        .box__description
        .box__description-container
        .box__description-text {
        color: #8c8aa7;
        line-height: 20px;
        margin-top: 20px;
      }
      .box .box__description .box__button {
        display: block;
        position: relative;
        background: #000000;
        border: 1px solid transparent;
        border-radius: 50px;
        height: 50px;
        text-align: center;
        text-decoration: none;
        color: #fff;
        line-height: 50px;
        font-size: 18px;
        padding: 0 70px;
        white-space: nowrap;
        margin-top: 25px;
        transition: background 0.5s ease;
        overflow: hidden;
        -webkit-mask-image: -webkit-radial-gradient(white, black);
      }
      .box .box__description .box__button:before {
        content: "";
        position: absolute;
        width: 20px;
        height: 100px;
        background: #fff;
        bottom: -25px;
        left: 0;
        border: 2px solid #fff;
        transform: translateX(-50px) rotate(45deg);
        transition: transform 0.5s ease;
      }
      .box .box__description .box__button:hover {
        background: transparent;
        border-color: #fff;
      }
      .box .box__description .box__button:hover:before {
        transform: translateX(250px) rotate(45deg);
      }

      @keyframes upndown {
        0% {
          transform: translateY(5px);
        }
        50% {
          transform: translateY(15px);
        }
        100% {
          transform: translateY(5px);
        }
      }
      @keyframes smallnbig {
        0% {
          width: 90px;
        }
        50% {
          width: 100px;
        }
        100% {
          width: 90px;
        }
      }
      @keyframes shine {
        0% {
          opacity: 0.2;
        }
        25% {
          opacity: 0.1;
        }
        50% {
          opacity: 0.2;
        }
        100% {
          opacity: 0.2;
        }
      }

      /*# sourceMappingURL=error.css.map */
    </style>
    <title>Document</title>
  </head>
  <body>
    <div class="box">
      <div class="box__ghost">
        <div class="symbol"></div>
        <div class="symbol"></div>
        <div class="symbol"></div>
        <div class="symbol"></div>
        <div class="symbol"></div>
        <div class="symbol"></div>

        <div class="box__ghost-container">
          <div class="box__ghost-eyes">
            <div class="box__eye-left"></div>
            <div class="box__eye-right"></div>
          </div>
          <div class="box__ghost-bottom">
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
          </div>
        </div>
        <div class="box__ghost-shadow"></div>
      </div>

      <div class="box__description">
        <div class="box__description-container">
          <div class="box__description-title">Whoops!</div>
          <div class="box__description-text">
            It seems like we couldn't find the page you were looking for
          </div>
        </div>

        <a href="https://google.com/" target="_blank" class="box__button"
          >Go back</a
        >
      </div>
    </div>
    <script>
      var pageX = $(document).width();
      var pageY = $(document).height();
      var mouseY = 0;
      var mouseX = 0;

      $(document).mousemove(function(event) {
        //verticalAxis
        mouseY = event.pageY;
        yAxis = ((pageY / 2 - mouseY) / pageY) * 300;
        //horizontalAxis
        mouseX = event.pageX / -pageX;
        xAxis = -mouseX * 100 - 100;

        $(".box__ghost-eyes").css({
          transform: "translate(" + xAxis + "%,-" + yAxis + "%)"
        });

        //console.log('X: ' + xAxis);
      });
    </script>
  </body>
</html>
