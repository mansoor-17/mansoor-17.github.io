    <div class="main-content">
      <!-- Header -->
      <div class="header bg-gradient-primary py-7 py-lg-8 pt-lg-7">
        <div class="container">
          <div class="header-body text-center mb-6">
            <div class="row justify-content-center">
              <div class="col-xl-5 col-lg-6 col-md-8 px-5">
                <h1 class="text-white">Create an account</h1>
              </div>
            </div>
          </div>
        </div>
        <div class="separator separator-bottom separator-skew zindex-100">
          <svg
            x="0"
            y="0"
            viewBox="0 0 2560 100"
            preserveAspectRatio="none"
            version="1.1"
            xmlns="http://www.w3.org/2000/svg"
          >
            <polygon
              class="fill-default"
              points="2560 0 2560 100 0 100"
            ></polygon>
          </svg>
        </div>

      <div class="container mt--8 pb-5">
        <!-- Table -->
        <div class="row justify-content-center">
          <div class="col-lg-6 col-md-8">
            <div class="card bg-secondary border-0">
              <div class="card-body px-lg-5 py-lg-5">
                <div class="text-center text-muted mb-4">
                  <small>Sign up by providing following details</small>
                </div>
                <form role="form" action="./dashboard.html">
                  <div class="row">
                    <div class="col-lg-12">
                      <div class="form-group">
                        <div class="row ml-2">
                          <label class="labels">
                            Account Type
                          </label>
                          <div class="custom-control custom-radio ml-5">
                            <input
                              name="custom-radio-1"
                              class="custom-control-input"
                              id="customRadio2"
                              checked=""
                              type="radio"
                            />
                            <label
                              class="custom-control-label"
                              for="customRadio2"
                              >Individual</label
                            >
                          </div>
                          <div class="custom-control custom-radio ml-5">
                            <input
                              name="custom-radio-1"
                              class="custom-control-input"
                              id="customRadio1"
                              type="radio"
                            />
                            <label
                              class="custom-control-label"
                              for="customRadio1"
                              >Organization</label
                            >
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                  <div class="row">
                    <div class="col-lg-6">
                      <div class="form-group">
                        <div
                          class="input-group input-group-merge input-group-alternative mb-3"
                        >
                          <div class="input-group-prepend">
                            <span class="input-group-text"
                              ><i class="ni ni-hat-3"></i
                            ></span>
                          </div>
                          <input
                            class="form-control"
                            placeholder="First Name"
                            type="text"
                          />
                        </div>
                      </div>
                    </div>
                    <div class="col-lg-6">
                      <div class="form-group">
                        <div
                          class="input-group input-group-merge input-group-alternative mb-3"
                        >
                          <div class="input-group-prepend">
                            <span class="input-group-text"
                              ><i class="ni ni-hat-3"></i
                            ></span>
                          </div>
                          <input
                            class="form-control"
                            placeholder="Last Name"
                            type="text"
                          />
                        </div>
                      </div>
                    </div>
                  </div>

                  <div class="form-group">
                    <div
                      class="input-group input-group-merge input-group-alternative mb-3"
                    >
                      <div class="input-group-prepend">
                        <span class="input-group-text"
                          ><i class="ni ni-email-83"></i
                        ></span>
                      </div>
                      <input
                        class="form-control"
                        placeholder="Email"
                        type="email"
                      />
                    </div>
                  </div>
                  <div class="form-group">
                    <div
                      class="input-group input-group-merge input-group-alternative mb-3"
                    >
                      <div class="input-group-prepend">
                        <span class="input-group-text"
                          ><i class="ni ni-mobile-button"></i
                        ></span>
                      </div>
                      <input
                        class="form-control"
                        placeholder="Mobile Number"
                        type="number"
                      />
                    </div>
                  </div>
                  <div class="row">
                    <div class="col-lg-6">
                      <div class="form-group">
                        <div
                          class="input-group input-group-merge input-group-alternative"
                        >
                          <div class="input-group-prepend">
                            <span class="input-group-text"
                              ><i class="ni ni-lock-circle-open"></i
                            ></span>
                          </div>
                          <input
                            class="form-control"
                            placeholder="Password"
                            type="password"
                          />
                        </div>
                      </div>
                    </div>
                    <div class="col-lg-6">
                      <div class="form-group">
                        <div
                          class="input-group input-group-merge input-group-alternative"
                        >
                          <div class="input-group-prepend">
                            <span class="input-group-text"
                              ><i class="ni ni-lock-circle-open"></i
                            ></span>
                          </div>
                          <input
                            class="form-control"
                            placeholder="Confirm Password"
                            type="password"
                          />
                        </div>
                      </div>
                    </div>
                  </div>

                  <div class="text-muted font-italic">
                    <small
                      >password strength:
                      <span class="text-success font-weight-700"
                        >strong</span

                  <div class="row my-4">
                    <div class="col-12">
                      <div
                        class="custom-control custom-control-alternative custom-checkbox"
                      >
                        <input
                          class="custom-control-input"
                          id="customCheckRegister"
                          type="checkbox"
                        />
                        <label
                          class="custom-control-label"
                          for="customCheckRegister"
                        >
                          <span class="text-muted"
                            >I agree with the
                            <a href="./Terms.html">Privacy Policy</a></span
                          >
                        </label>
                      </div>
                    </div>
                  </div>
                  <hr />
                  <div class="text-muted font-italic mb-2">
                    <small>Optional: Enter a Url to begin monitoring </small>
                  </div>
                  <div class="form-group">

                      class="input-group input-group-merge input-group-alternative mb-3"
                    >
                      <div class="input-group-prepend">
                        <span class="input-group-text"
                          ><i class="ni ni-mobile-button"></i
                        ></span>
                      </div>
                      <input
                        class="form-control"
                        placeholder="Url"
                        type="text"
                      />
                    </div>
                  </div>
                  <div class="text-center">
                    <button type="submit" class="btn btn-primary mt-4">
                      Create account
                    </button>
                  </div>
                </form>
              </div>
